version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:14-alpine
    container_name: unilogi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unilogi_user
      POSTGRES_PASSWORD: unilogi_password_dev
      POSTGRES_DB: unilogi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unilogi_user -d unilogi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unilogi_network

  # pgAdmin pour gérer PostgreSQL (optionnel - interface web)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: unilogi_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@unilogi.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - unilogi_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  unilogi_network:
    driver: bridge
